AWSTemplateFormatVersion: "2010-09-09"
Description: Real-Time SIP Denoising Pipeline Infrastructure

Resources:

  DenoiseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SIP and Web access
      SecurityGroupIngress:
        - IpProtocol: udp
          FromPort: 5060
          ToPort: 5060
          CidrIp: 0.0.0.0/0

        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          CidrIp: 0.0.0.0/0

  DenoiseInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.medium
      ImageId: ami-xxxxxxxx   # <-- Replace with your AMI ID
      SecurityGroupIds:
        - !Ref DenoiseSecurityGroup
      Tags:
        - Key: Name
          Value: DenoisePipelineInstance

Outputs:
  InstancePublicIP:
    Description: Public IP of instance
    Value: !GetAtt DenoiseInstance.PublicIp